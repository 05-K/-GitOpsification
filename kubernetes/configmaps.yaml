    \"query\": {\n          \"query\": \"query_result(sum ({__name__=~\\\".*traces_span_metrics_calls_total\\\",service_name=~\\\"$service\\\"})  by (span_name))\",\n          \"refId\": \"StandardVariableQuery\"\n        },\n        \"refresh\": 2,\n        \"regex\": \"/.*span_name=\\\"(.*)\\\".*/\",\n        \"type\": \"query\"\n      }\n    ]\n  },\n  \"time\": {\n    \"from\": \"now-15m\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"timezone\": \"\",\n  \"title\": \"Spanmetrics Demo Dashboard\",\n  \"uid\": \"W2gX2zHVk48\",\n  \"version\": 2,\n  \"weekStart\": \"\"\n}"},"kind":"ConfigMap","metadata":{"annotations":{},"labels":{"app.kubernetes.io/part-of":"opentelemetry-demo","app.kubernetes.io/version":"2.1.3","grafana_dashboard":"1"},"name":"grafana-dashboard-spanmetrics-dashboard","namespace":"otel-demo"}}
