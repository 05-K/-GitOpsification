    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"opensearch.yml":"cluster.name: opensearch-cluster\n\n# Bind to all interfaces because we don't know what IP address Docker will assign to us.\nnetwork.host: 0.0.0.0\n\n# Setting network.host to a non-loopback address enables the annoying bootstrap checks. \"Single-node\" mode disables them again.\n# Implicitly done if \".singleNode\" is set to \"true\".\n# discovery.type: single-node\n\n# Start OpenSearch Security Demo Configuration\n# WARNING: revise all the lines below before you go into production\n# plugins:\n#   security:\n#     ssl:\n#       transport:\n#         pemcert_filepath: esnode.pem\n#         pemkey_filepath: esnode-key.pem\n#         pemtrustedcas_filepath: root-ca.pem\n#         enforce_hostname_verification: false\n#       http:\n#         enabled: true\n#         pemcert_filepath: esnode.pem\n#         pemkey_filepath: esnode-key.pem\n#         pemtrustedcas_filepath: root-ca.pem\n#     allow_unsafe_democertificates: true\n#     allow_default_init_securityindex: true\n#     authcz:\n#       admin_dn:\n#         - CN=kirk,OU=client,O=client,L=test,C=de\n#     audit.type: internal_opensearch\n#     enable_snapshot_restore_privilege: true\n#     check_snapshot_restore_write_privileges: true\n#     restapi:\n#       roles_enabled: [\"all_access\", \"security_rest_api_access\"]\n#     system_indices:\n#       enabled: true\n#       indices:\n#         [\n#           \".opendistro-alerting-config\",\n#           \".opendistro-alerting-alert*\",\n#           \".opendistro-anomaly-results*\",\n#           \".opendistro-anomaly-detector*\",\n#           \".opendistro-anomaly-checkpoints\",\n#           \".opendistro-anomaly-detection-state\",\n#           \".opendistro-reports-*\",\n#           \".opendistro-notifications-*\",\n#           \".opendistro-notebooks\",\n#           \".opendistro-asynchronous-search-response*\",\n#         ]\n######## End OpenSearch Security Demo Configuration ########\n"},"kind":"ConfigMap","metadata":{"annotations":{},"labels":{"app.kubernetes.io/component":"opensearch","app.kubernetes.io/instance":"opentelemetry-demo","app.kubernetes.io/name":"opensearch","app.kubernetes.io/version":"3.2.0"},"name":"opensearch-config","namespace":"otel-demo"}}
    creationTimestamp: "2026-03-31T11:45:16Z"
    labels:
      app.kubernetes.io/component: opensearch
      app.kubernetes.io/instance: opentelemetry-demo
      app.kubernetes.io/name: opensearch
      app.kubernetes.io/version: 3.2.0
    name: opensearch-config
    namespace: otel-demo
    resourceVersion: "33154"
    uid: 9d7d6644-a8a8-4cd0-812c-5c87a71d1fc4
- apiVersion: v1
  data:
    relay: |
      connectors:
        spanmetrics: {}
      exporters:
        debug: {}
        opensearch:
          http:
            endpoint: http://opensearch:9200
            tls:
              insecure: true
          logs_index: otel-logs
          logs_index_time_format: yyyy-MM-dd
        otlp:
          endpoint: jaeger-collector:4317
          tls:
            insecure: true
        otlphttp/prometheus:
          endpoint: http://prometheus:9090/api/v1/otlp
          tls:
            insecure: true
      extensions:
        health_check:
          endpoint: ${env:MY_POD_IP}:13133
      processors:
        batch: {}
        k8sattributes:
          extract:
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 25
        resource:
          attributes:
          - action: insert
            from_attribute: k8s.pod.uid
            key: service.instance.id
        resourcedetection:
          detectors:
          - env
          - system
        transform:
          error_mode: ignore
          trace_statements:
          - context: span
            statements:
            - replace_pattern(name, "\\?.*", "")
            - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")
      receivers:
        httpcheck/frontend-proxy:
          targets:
          - endpoint: http://frontend-proxy:8080
        jaeger:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:14250
            thrift_compact:
              endpoint: ${env:MY_POD_IP}:6831
            thrift_http:
              endpoint: ${env:MY_POD_IP}:14268
        nginx:
          collection_interval: 10s
          endpoint: http://image-provider:8081/status
        otlp:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:4317
            http:
              cors:
                allowed_origins:
                - http://*
                - https://*
              endpoint: ${env:MY_POD_IP}:4318
        postgresql:
          endpoint: postgresql:5432
          metrics:
            postgresql.blks_hit:
              enabled: true
            postgresql.blks_read:
              enabled: true
            postgresql.deadlocks:
              enabled: true
            postgresql.tup_deleted:
              enabled: true
            postgresql.tup_fetched:
              enabled: true
            postgresql.tup_inserted:
              enabled: true
            postgresql.tup_returned:
              enabled: true
            postgresql.tup_updated:
              enabled: true
          password: otel
          tls:
            insecure: true
          username: root
        prometheus:
          config:
            scrape_configs:
            - job_name: opentelemetry-collector
              scrape_interval: 10s
              static_configs:
              - targets:
                - ${env:MY_POD_IP}:8888
        redis:
          collection_interval: 10s
          endpoint: valkey-cart:6379
          username: valkey
        zipkin:
          endpoint: ${env:MY_POD_IP}:9411
      service:
        extensions:
        - health_check
        pipelines:
          logs:
            exporters:
            - opensearch
            - debug
            processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - batch
            receivers:
            - otlp
          metrics:
            exporters:
            - otlphttp/prometheus
            - debug
            processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - batch
            receivers:
            - httpcheck/frontend-proxy
            - nginx
            - otlp
            - postgresql
            - redis
            - spanmetrics
          traces:
            exporters:
            - otlp
            - debug
            - spanmetrics
            processors:
            - k8sattributes
            - memory_limiter
            - resourcedetection
            - resource
            - transform
            - batch
            receivers:
            - otlp
            - jaeger
            - zipkin
        telemetry:
          metrics:
            level: detailed
            readers:
            - periodic:
                exporter:
                  otlp:
                    endpoint: otel-collector:4318
                    protocol: http/protobuf
                interval: 10000
                timeout: 5000
