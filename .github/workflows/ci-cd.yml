name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0
      
      - name: Check Kubernetes manifests
        run: |
          echo "Checking Kubernetes manifests..."
          ls -la kubernetes/
          echo "Total manifests: $(ls kubernetes/*.yaml | wc -l)"
      
      - name: Validate Terraform
        run: |
          cd terraform
          terraform fmt -check
          terraform init -backend=false
          terraform validate
      
      - name: Verify URLs
        run: |
          echo "Demo URLs:"
          echo "Web Store: https://crewhive.site"
          echo "Grafana: https://crewhive.site/grafana"
          echo "Jaeger: https://crewhive.site/jaeger"
